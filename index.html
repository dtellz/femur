<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Femur - Gaussian Splat World</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #000; }
    canvas { display: block; }
    #loading {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #0a0a0a;
      color: #ccc;
      font-family: system-ui, -apple-system, sans-serif;
      z-index: 10;
      transition: opacity 0.5s ease;
    }
    #loading.hidden { opacity: 0; pointer-events: none; }
    #loading h1 { font-size: 1.5rem; font-weight: 300; margin-bottom: 1rem; letter-spacing: 0.1em; }
    #progress-bar {
      width: 200px;
      height: 2px;
      background: #333;
      border-radius: 1px;
      overflow: hidden;
    }
    #progress-fill {
      height: 100%;
      width: 0%;
      background: #fff;
      transition: width 0.2s ease;
    }
    #progress-text {
      margin-top: 0.5rem;
      font-size: 0.75rem;
      color: #666;
    }
  </style>
</head>
<body>
  <div id="loading">
    <h1>FEMUR</h1>
    <div id="progress-bar"><div id="progress-fill"></div></div>
    <div id="progress-text">Loading world...</div>
  </div>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
